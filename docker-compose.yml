version: '3.8'

services:
  # ─── Service 1: The Backend ───
  backend:
    build: 
      context: ./backend    # Tells Docker where to find the backend Dockerfile
    ports:
      - "8000:8000"         # Maps your laptop's port 8000 to the container's port 8000
    env_file:
      - ./backend/.env      # Automatically injects your Supabase keys!

  # ─── Service 2: The Frontend ───
  frontend:
    build: 
      context: ./frontend   # Tells Docker where to find the frontend Dockerfile
    ports:
      - "3000:3000"         # Maps your laptop's port 3000 to the container's port 3000
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend             # Tells Docker: "Don't start the frontend until the backend is up!"
